<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="512" height="512" fill="#1a2236"/>

  <!-- Moon -->
  <circle cx="256" cy="215" r="178" fill="#d4c8a0" opacity="0.88"/>

  <!-- Tower silhouette colour -->
  <defs>
    <style>.t { fill: #232e44; }</style>
  </defs>

  <!-- ── LEFT TURRET ── -->
  <rect class="t" x="108" y="210" width="52" height="190"/>
  <!-- Left turret battlements -->
  <rect class="t" x="108" y="198" width="14" height="18"/>
  <rect class="t" x="130" y="198" width="14" height="18"/>
  <rect class="t" x="152" y="198" width="8"  height="18"/>
  <!-- Left turret spire -->
  <polygon class="t" points="108,210 160,210 134,158"/>

  <!-- ── RIGHT TURRET ── -->
  <rect class="t" x="352" y="210" width="52" height="190"/>
  <!-- Right turret battlements -->
  <rect class="t" x="352" y="198" width="8"  height="18"/>
  <rect class="t" x="368" y="198" width="14" height="18"/>
  <rect class="t" x="390" y="198" width="14" height="18"/>
  <!-- Right turret spire -->
  <polygon class="t" points="352,210 404,210 378,158"/>

  <!-- ── HORIZONTAL LINTEL connecting turrets ── -->
  <rect class="t" x="108" y="245" width="296" height="18"/>

  <!-- ── MAIN TOWER BODY ── -->
  <rect class="t" x="178" y="263" width="156" height="197"/>

  <!-- ── CENTRAL SPIRE ── -->
  <rect class="t" x="234" y="120" width="44" height="150"/>
  <polygon class="t" points="220,128 292,128 256,42"/>
  <!-- Spire finial nub -->
  <rect class="t" x="248" y="38" width="16" height="10"/>

  <!-- ── ARCH OPENINGS in turrets (negative space via light fill matching moon) ── -->
  <!-- Left turret arch window -->
  <rect x="118" y="270" width="32" height="28" fill="#232e44"/>
  <!-- Right turret arch window -->
  <rect x="362" y="270" width="32" height="28" fill="#232e44"/>

  <!-- ── CLOCK FACE ── -->
  <circle cx="256" cy="336" r="54" fill="white"/>
  <circle cx="256" cy="336" r="54" fill="none" stroke="#232e44" stroke-width="5"/>
  <!-- Hour markers -->
  <line x1="256" y1="286" x2="256" y2="297" stroke="#232e44" stroke-width="3"/>
  <line x1="256" y1="375" x2="256" y2="386" stroke="#232e44" stroke-width="3"/>
  <line x1="202" y1="336" x2="213" y2="336" stroke="#232e44" stroke-width="3"/>
  <line x1="299" y1="336" x2="310" y2="336" stroke="#232e44" stroke-width="3"/>
  <!-- Minute hand pointing to ~12 -->
  <line x1="256" y1="336" x2="256" y2="295" stroke="#232e44" stroke-width="4" stroke-linecap="round"/>
  <!-- Hour hand pointing to ~10 -->
  <line x1="256" y1="336" x2="228" y2="310" stroke="#232e44" stroke-width="5" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="256" cy="336" r="5" fill="#232e44"/>

  <!-- ── BLOOD ── -->
  <!-- Drip streaks on tower / spire area -->
  <path d="M248,180 L244,240 Q246,220 252,180 Z" fill="#cc0011"/>
  <path d="M262,175 L266,235 Q264,215 258,175 Z" fill="#cc0011"/>

  <!-- Dramatic diagonal blood streak / pool at the bottom -->
  <path d="M155,440 Q200,418 270,428 Q330,422 390,404 L420,400 Q400,420 355,438 Q285,458 215,455 Q175,455 155,448 Z"
        fill="#cc0011"/>
  <!-- Shadow layer for depth -->
  <path d="M168,452 Q220,438 295,446 Q350,442 398,428 L415,426 Q395,444 348,458 Q278,472 210,468 Q178,467 168,460 Z"
        fill="#cc0011" opacity="0.55"/>

  <!-- Blood splatter dots -->
  <circle cx="232" cy="420" r="5" fill="#cc0011"/>
  <circle cx="310" cy="412" r="4" fill="#cc0011"/>
  <circle cx="360" cy="432" r="3" fill="#cc0011"/>
  <circle cx="195" cy="438" r="4" fill="#cc0011"/>

</svg>
