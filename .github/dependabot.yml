version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    ignore:
      # Tailwind v4 is a breaking change (new PostCSS plugin, new config format).
      # Upgrade must be done manually as a dedicated migration.
      - dependency-name: tailwindcss
        update-types: ["version-update:semver-major"]
