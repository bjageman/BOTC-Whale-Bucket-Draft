name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Start ntfy server (Docker)
        run: docker run -d --name ntfy -p 8080:80 binwiederhier/ntfy serve

      - name: Run scale integration test
        env:
          VITE_NTFY_SERVER_URL: 127.0.0.1:8080
          VITE_NTFY_ADMIN_USERNAME: ""
          VITE_NTFY_ADMIN_PASSWORD: ""
        run: npm run test:scale
